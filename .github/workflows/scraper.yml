name: Refresh SQLite Data

on:
  schedule:
    - cron: "10 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-store:
    runs-on: ubuntu-22.04
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape next 60 days into SQLite
        run: |
          python auto_scraper.py --days 60 --skip-json

      - name: Commit and push SQLite update
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f volleyball.db
          git diff --cached --quiet || (git commit -m "Automated update: refresh next 60 days" && git push)

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-data
          path: |
            failed_parse_dump.html
            error_screenshot.png
            volleyball.db
