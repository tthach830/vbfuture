name: Refresh SQLite Data

on:
  schedule:
    # Every Monday at 09:10 UTC; biweekly gating is handled in-job
    - cron: "10 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-store:
    runs-on: ubuntu-22.04
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine biweekly run
        id: biweekly
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            WEEK_NUM=$(date +%V)
            if [ $((10#$WEEK_NUM % 2)) -eq 0 ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "Biweekly run enabled for ISO week $WEEK_NUM"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skipping this week (ISO week $WEEK_NUM) for biweekly cadence"
            fi
          fi

      - name: Setup Python
        if: steps.biweekly.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        if: steps.biweekly.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        if: steps.biweekly.outputs.should_run == 'true'
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape next 60 days into SQLite
        if: steps.biweekly.outputs.should_run == 'true'
        run: |
          python auto_scraper.py --days 60 --skip-json

      - name: Commit and push SQLite update
        if: steps.biweekly.outputs.should_run == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f volleyball.db
          git diff --cached --quiet || (git commit -m "Automated update: refresh next 60 days" && git push)

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-data
          path: |
            failed_parse_dump.html
            error_screenshot.png
            volleyball.db
